<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --red:#c8102e; --black:#111; --gray:#555; --gray-light:#e8e8e8; --gray-bg:#f5f5f5; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Barlow',sans-serif; background:var(--gray-bg); min-height:100vh; display:flex; flex-direction:column; }
header { background:var(--black); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }

.logo { font-family:'Oswald',sans-serif; line-height:1; flex-shrink:0; cursor:pointer; display:flex; align-items:center; gap:10px; text-decoration:none; }
.logo-icon { width:38px; height:38px; background:var(--red); border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; position:relative; overflow:hidden; transform:rotate(-2deg); box-shadow:3px 3px 0 #7a0a1a; }
.logo-icon::after { content:'⚖️'; font-size:20px; line-height:1; }
.logo-text { display:flex; flex-direction:column; gap:0px; }
.logo-line1 { font-size:13px; letter-spacing:0.22em; color:#aaa; line-height:1; font-family:'Barlow',sans-serif; font-weight:700; text-transform:uppercase; }
.logo-line2 { font-size:24px; letter-spacing:0.04em; line-height:0.95; color:white; font-family:'Oswald',sans-serif; font-weight:700; }
.logo span { color:var(--red); }
.header-right { display:flex; align-items:center; gap:16px; }
.user-name { color:#ccc; font-size:13px; }
.nav-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:7px 16px; border-radius:4px; font-size:13px; cursor:pointer; }
.nav-btn:hover { background:rgba(255,255,255,0.2); }

.main { flex:1; max-width:1100px; margin:0 auto; width:100%; padding:28px 24px; }
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.page-title { font-family:'Oswald',sans-serif; font-size:26px; font-weight:700; }
.page-sub { font-size:14px; color:var(--gray); margin-top:2px; }

.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:28px; }
.stat-card { background:white; border-radius:8px; border:1px solid var(--gray-light); padding:20px; text-align:center; }
.stat-num { font-family:'Oswald',sans-serif; font-size:36px; font-weight:700; color:var(--red); }
.stat-label { font-size:13px; color:var(--gray); margin-top:4px; }

.filter-bar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
.filter-btn { padding:7px 16px; border:1px solid var(--gray-light); border-radius:20px; font-size:13px; cursor:pointer; background:white; transition:all 0.2s; }
.filter-btn.active { background:var(--red); color:white; border-color:var(--red); }
#chiroFilter { padding:7px 16px; border:1px solid var(--gray-light); border-radius:20px; font-size:13px; cursor:pointer; background:white; transition:all 0.2s; }

.referral-list { display:flex; flex-direction:column; gap:12px; }
.referral-card { background:white; border-radius:8px; border:1px solid var(--gray-light); overflow:hidden; transition:box-shadow 0.2s; }
.referral-card:hover { box-shadow:0 4px 20px rgba(0,0,0,0.08); }
.referral-card.new-ref { border-left:4px solid var(--red); }

.ref-header { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; gap:12px; flex-wrap:wrap; }
.ref-patient { font-family:'Oswald',sans-serif; font-size:17px; font-weight:700; color:var(--black); }
.ref-meta { font-size:12px; color:var(--gray); margin-top:2px; }
.ref-right { display:flex; align-items:center; gap:10px; }
.status-badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; }
.status-badge.sent { background:#eff6ff; color:#1d4ed8; }
.status-badge.viewed { background:#fef9c3; color:#854d0e; }
.status-badge.accepted { background:#f0fff4; color:#166534; }
.chevron { font-size:12px; color:#aaa; transition:transform 0.2s; }
.chevron.open { transform:rotate(180deg); }

.ref-body { display:none; border-top:1px solid var(--gray-light); }
.ref-body.open { display:block; }
.ref-body-inner { padding:20px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }

.ref-section h4 { font-family:'Oswald',sans-serif; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--red); margin-bottom:10px; }
.ref-field { margin-bottom:7px; font-size:13px; }
.ref-field .lbl { color:#aaa; font-size:11px; text-transform:uppercase; letter-spacing:.06em; display:block; margin-bottom:1px; }
.ref-field .val { color:var(--black); font-weight:500; }

.ref-footer { padding:14px 20px; border-top:1px solid var(--gray-light); background:#fafafa; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

.empty-state { text-align:center; padding:60px; color:#aaa; background:white; border-radius:8px; border:1px solid var(--gray-light); }
.empty-icon { font-size:48px; margin-bottom:12px; }
footer { background:var(--black); color:#666; text-align:center; padding:16px; font-size:12px; }

@media(max-width:700px) { .ref-body-inner { grid-template-columns:1fr; } .stats-row { grid-template-columns:1fr; } }
</style>
</head>
<body>

<header>
<a class="logo" href="/">
<div class="logo-icon"></div>
<div class="logo-text">
<span class="logo-line1">I Hate</span>
<span class="logo-line2">CAR ACCIDENTS</span>
</div>
</a>
<div class="header-right">
<span class="user-name" id="user-name">Loading...</span>
<button class="nav-btn" onclick="doLogout()">Sign Out</button>
</div>
</header>

<div class="main">
<div class="page-header">
<div>
<div style="display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;">
<div class="page-title">My Referrals</div>
<div style="font-family:'Oswald',sans-serif;font-size:18px;color:#555;">Welcome, <span id="atty-welcome-name" style="color:var(--red);font-weight:700;"></span></div>
</div>
<div class="page-sub" id="practice-name">Loading your dashboard...</div>
</div>
</div>

<div class="stats-row">
<div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total Referrals Sent</div></div>
<div class="stat-card"><div class="stat-num" id="stat-new">—</div><div class="stat-label">Pending Response</div></div>
<div class="stat-card"><div class="stat-num" id="stat-accepted">—</div><div class="stat-label">Accepted</div></div>
</div>

<div class="filter-bar">
<select id="chiroFilter" onchange="filterByChiro()">
<option value="">All Providers</option>
</select>
<button class="filter-btn active" onclick="filterRefs('all', this)">All</button>
<button class="filter-btn" onclick="filterRefs('sent', this)">Pending</button>
<button class="filter-btn" onclick="filterRefs('accepted', this)">Accepted</button>
</div>

<div class="referral-list" id="referral-list">
<div class="empty-state"><div class="empty-icon">📋</div>Loading referrals...</div>
</div>
</div>

<footer>© 2025 IHateCarAccidents.com — Attorney Portal — Secure &amp; Encrypted</footer>

<script>
const SUPABASE_URL = 'https://xlhkduyviqzzyxjqnjxj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsaGtkdXl2aXF6enl4anFuanhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzYxNzQsImV4cCI6MjA5MjMxMjE3NH0.QhhkZ8QFYTtlC5cRc9v2EGMSroiavdq69D_-dYFxnqI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let allReferrals = [];
let currentFilter = 'all';
let currentChiroFilter = '';

sb.auth.getSession().then(({ data: { session } }) => {
if (!session) { showAttyLogin(); return; }
currentUser = session.user;
sb.from('profiles').select('full_name, firm').eq('id', currentUser.id).single().then(({ data }) => {
document.getElementById('user-name').textContent = data?.full_name || currentUser.email;
document.getElementById('practice-name').textContent = data?.firm || 'Attorney Dashboard';
var wwn = document.getElementById('atty-welcome-name'); if (wwn) wwn.textContent = (data?.full_name || currentUser.email).split(' ')[0];
loadReferrals();
});
});

function doLogout() { sb.auth.signOut().then(() => window.location.href = '/portal.html'); }

async function loadReferrals() {
var { data, error } = await sb.from('referrals')
.select('*')
.eq('atty_email', currentUser.email)
.order('created_at', {ascending:false});

if (error || !data) { document.getElementById('referral-list').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div>Error loading referrals. Please refresh.</div>'; return; }

allReferrals = data;
document.getElementById('stat-total').textContent = data.length;
document.getElementById('stat-new').textContent = data.filter(r=>r.status==='sent').length;
document.getElementById('stat-accepted').textContent = data.filter(r=>r.status==='accepted').length;
populateChiroFilter();
renderReferrals();
}

function populateChiroFilter() {
const chiroSet = new Set();
const chiroNames = [];
allReferrals.forEach(ref => {
const chiroName = ref.chiro_name || 'Unknown';
if (!chiroSet.has(chiroName)) {
chiroSet.add(chiroName);
chiroNames.push(chiroName);
}
});
const select = document.getElementById('chiroFilter');
while (select.options.length > 1) select.remove(1);
chiroNames.sort().forEach(name => {
const option = document.createElement('option');
option.value = name;
option.textContent = name;
select.appendChild(option);
});
}

function filterByChiro() {
currentChiroFilter = document.getElementById('chiroFilter').value;
renderReferrals();
}

function filterRefs(filter, btn) {
currentFilter = filter;
document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
renderReferrals();
}

function renderReferrals() {
var refs = allReferrals;
if (currentChiroFilter) {
refs = refs.filter(r => (r.chiro_name === currentChiroFilter || r.chiro_email === currentChiroFilter));
}
refs = currentFilter==='all' ? refs : refs.filter(r=>r.status===currentFilter);
var list = document.getElementById('referral-list');
if (!refs.length) {
list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No referrals found.</p></div>';
return;
}
list.innerHTML = refs.map(r => `
<div class="referral-card ${r.status==='sent'?'new-ref':''}" id="ref-${r.id}">
<div class="ref-header" onclick="toggleRef('${r.id}')">
<div>
<div class="ref-patient">${r.patient_name}</div>
<div class="ref-meta">${r.incident_type} · ${new Date(r.created_at).toLocaleDateString()} · To: ${r.chiro_name || 'Unknown'}</div>
</div>
<div class="ref-right">
<span class="status-badge ${r.status}">${r.status==='sent'?'Pending':r.status}</span>
<span class="chevron" id="chev-${r.id}">▼</span>
</div>
</div>
<div class="ref-body" id="body-${r.id}">
<div class="ref-body-inner">
<div class="ref-section">
<h4>Patient</h4>
<div class="ref-field"><span class="lbl">Full Name</span><span class="val">${r.patient_name}</span></div>
<div class="ref-field"><span class="lbl">Date of Birth</span><span class="val">${r.dob||'—'}</span></div>
<div class="ref-field"><span class="lbl">Phone</span><span class="val">${r.patient_phone}</span></div>
<div class="ref-field"><span class="lbl">Language</span><span class="val">${r.language||'English'}</span></div>
<div class="ref-field"><span class="lbl">Date of Incident</span><span class="val">${r.incident_date}</span></div>
<div class="ref-field"><span class="lbl">Incident Type</span><span class="val">${r.incident_type}</span></div>
</div>
<div class="ref-section">
<h4>Provider</h4>
<div class="ref-field"><span class="lbl">Name</span><span class="val">${r.chiro_name}</span></div>
<div class="ref-field"><span class="lbl">Phone</span><span class="val">${r.chiro_phone}</span></div>
<div class="ref-field"><span class="lbl">Email</span><span class="val">${r.chiro_email}</span></div>
</div>
<div class="ref-section">
<h4>Insurance</h4>
<div class="ref-field"><span class="lbl">Company</span><span class="val">${r.insurance||'—'}</span></div>
<div class="ref-field"><span class="lbl">Claim Number</span><span class="val">${r.claim_number||'—'}</span></div>
<div class="ref-field"><span class="lbl">Adjuster Name</span><span class="val">${r.adjuster_name||'—'}</span></div>
<div class="ref-field"><span class="lbl">Adjuster Phone</span><span class="val">${r.adjuster_phone||'—'}</span></div>
${r.notes?`<div class="ref-field"><span class="lbl">Notes</span><span class="val">${r.notes}</span></div>`:''}
</div>
</div>
<div class="ref-footer">
${r.status!=='accepted'?`Status: Pending response from ${r.chiro_name}`:`<span style="color:#166534;font-weight:600;font-size:13px;">✓ Accepted by ${r.chiro_name}</span>`}
</div>
</div>
`).join('');
}

function toggleRef(id) {
var body = document.getElementById('body-'+id);
var chev = document.getElementById('chev-'+id);
var open = body.classList.toggle('open');
chev.classList.toggle('open', open);
}

async function doAttyLogin() {
var email = document.getElementById('atty-login-email').value.trim();
var pw = document.getElementById('atty-login-pw').value;
var err = document.getElementById('atty-login-err');
err.style.display = 'none';
if (!email || !pw) { err.textContent = 'Please enter your email and password.'; err.style.display = 'block'; return; }
var { data, error } = await sb.auth.signInWithPassword({ email: email, password: pw });
if (error) {
err.textContent = error.message.includes('Invalid') ? 'Incorrect email or password.' : error.message;
err.style.display = 'block';
return;
}
currentUser = data.user;
sb.from('profiles').select('full_name, firm').eq('id', currentUser.id).single().then(({ data: profile }) => {
if (profile) {
document.getElementById('user-name').textContent = profile.full_name || currentUser.email;
document.getElementById('practice-name').textContent = profile.firm || '';
} else {
document.getElementById('user-name').textContent = currentUser.email;
}
location.reload();
});
}

function showAttyLogin() {
document.body.innerHTML = `
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--gray-bg);">
<div style="background:white;border-radius:10px;padding:36px 32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.15);">
<h2 style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px;">Attorney Portal</h2>
<p style="font-size:13px;color:#888;margin-bottom:24px;">IHateCarAccidents.com — Attorney Login</p>
<div id="atty-login-err" style="color:#c00;font-size:13px;margin-bottom:12px;display:none;"></div>
<label style="display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#333;margin-bottom:5px;">Email Address</label>
<input type="email" id="atty-login-email" placeholder="your@email.com" autocomplete="email" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:6px;font-size:14px;margin-bottom:16px;outline:none;box-sizing:border-box;" onkeydown="if(event.key==='Enter')doAttyLogin()">
<label style="display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#333;margin-bottom:5px;">Password</label>
<input type="password" id="atty-login-pw" placeholder="Your password" autocomplete="current-password" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:6px;font-size:14px;margin-bottom:16px;outline:none;box-sizing:border-box;" onkeydown="if(event.key==='Enter')doAttyLogin()">
<button style="width:100%;padding:13px;background:var(--red);color:white;border:none;border-radius:6px;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.05em;" onclick="doAttyLogin()">Sign In</button>
</div>
</div>
`;
}

</script>
</body>
</html>
